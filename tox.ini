[tox]
project = virtualenv_tools
envlist = py,pypy3

[testenv]
deps = -rrequirements-dev.txt
commands =
    coverage erase
    coverage run -m pytest {posargs:tests}
    coverage report

[testenv:venv]
envdir = venv-{[tox]project}
commands =

[testenv:older-virtualenv]
commands_pre =
    pip install "virtualenv<20.36.0"

[pep8]
ignore = E265,E501,W504
